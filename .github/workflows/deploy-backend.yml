name: Deploy Backend to Render

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'render.yaml'
      - '.github/workflows/deploy-backend.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Trigger Render deploy webhook
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            --fail \
            -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

      - name: Confirm trigger
        run: echo "Render deploy triggered. Monitor at https://dashboard.render.com"
